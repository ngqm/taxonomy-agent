# TaxonomyAgent Streamlit theme — "The Journal" (Direction B), Day palette.
# Editorial / scientific-catalogue: warm paper, vermilion accent, square corners.
# Base font is the SANS body face (Public Sans); headings/figures are switched
# to the Newsreader serif in demo/theme.py. This is the static base Streamlit
# paints before the app's injected CSS adds the runtime Day/Night switch.
[theme]
primaryColor = "#B63D29"              # vermilion (exact oklch 0.53 0.16 32)
backgroundColor = "#EAE6DD"           # warm paper canvas (oklch 0.925 0.013 84)
secondaryBackgroundColor = "#F3F0E9"  # sidebar / inputs (oklch 0.955 0.01 82)
textColor = "#554B43"                 # body ink (oklch 0.42 0.018 60)
font = "sans serif"
