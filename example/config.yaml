# taxonomy_agent config — fill in the three required fields, tweak the rest.
# Any CLI flag overrides its value here.

# ── REQUIRED ────────────────────────────────────────────────────────────────
input: example/items.jsonl     # balanced 48-item slice of DarkBench (6 dark-pattern classes)
instruction_file: example/instruction.txt   # OR set `instruction:` inline
output_dir: example/out

# Inline instruction (use INSTEAD of instruction_file):
# instruction: |
#   Group these user prompts by the type of manipulative dark pattern each is
#   designed to elicit from an AI assistant. Focus on the manipulation tactic,
#   not the surface topic of the request.

# ── MODELS ──────────────────────────────────────────────────────────────────
orchestrator: deepseek/deepseek-v4-flash
judge: deepseek/deepseek-v4-flash

# ── DISCOVERY LOOP ──────────────────────────────────────────────────────────
max_iters: 10                # hard cap on discovery iterations
threshold: 0.10              # stop when don't-fit rate < this on a fresh probe
probe_size: 20               # K — items per probe batch
size_hint: "4–10"            # free-form target size in the orchestrator prompt;
                             #   "" (empty) drops the guidance entirely
# category_focus: ""         # what categories should describe — e.g.
#                            #   "what each text is about" (topic modeling),
#                            #   "the reasoning strategy each chain of thought uses"
#                            # default: none — instruction carries the meaning

# ── EXECUTION ───────────────────────────────────────────────────────────────
concurrency: 8               # parallel judge calls
recursion_limit: 80          # LangGraph super-step cap
# pool_limit: 50             # uncomment for smoke testing
